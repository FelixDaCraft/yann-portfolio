server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirections relatives — derrière le tunnel Cloudflare, une redirection
    # absolue reconstruirait http://host sans le https ni le port d'origine.
    absolute_redirect off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Sécurité de base
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://cdn.simpleicons.org data:; connect-src 'self'; frame-ancestors 'self'" always;

    # API backoffice → conteneur yann-api (réseau compose interne).
    # resolver Docker + variable : nginx ré-résout l'IP si yann-api est recréé
    # pendant qu'il tourne (sinon l'IP est figée au chargement de la conf).
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://yann-api:3000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CF-Connecting-IP / CF-IPCountry (headers de requête Cloudflare) transitent par défaut
        client_max_body_size 16k;
        proxy_read_timeout 30s;
    }

    # Backoffice SPA — admin.html buildé à la racine du dist
    location = /admin {
        return 302 /admin/;
    }
    location ^~ /admin/ {
        try_files $uri /admin.html;
    }

    # Cache long pour les assets buildés (hashés par Vite — assets/[name]-[hash])
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # HTML : pas de cache (le contenu peut bouger).
    # ⚠️ add_header dans une location annule TOUS ceux du niveau server →
    # on redéclare les headers de sécurité ici (c'est la réponse qui compte le plus).
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://cdn.simpleicons.org data:; connect-src 'self'; frame-ancestors 'self'" always;
    }

    # Static site fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
